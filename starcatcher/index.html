<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Starcatcher</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Arcade</p>
          <h1>Starcatcher</h1>
        </div>
        <div class="stats" aria-live="polite">
          <span><b id="score">0</b> score</span>
          <span><b id="combo">1x</b> combo</span>
          <span><b id="lives">3</b> lives</span>
          <span><b id="time">60</b>s</span>
        </div>
        <button id="restart" type="button">Restart</button>
      </header>

      <canvas id="game" width="1200" height="720" aria-label="Starcatcher game"></canvas>

      <footer class="controls">
        <span><kbd>A</kbd>/<kbd>D</kbd> or <kbd>←</kbd>/<kbd>→</kbd> move</span>
        <span><kbd>Space</kbd> dash</span>
        <span>Catch stars, dodge comets, keep the combo alive.</span>
      </footer>
    </main>
    <script src="game.js"></script>
  </body>
</html>
