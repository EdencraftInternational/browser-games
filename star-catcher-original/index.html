<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Star Catcher</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #101015;
      color: #f6f1e8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 201, 92, 0.2), transparent 26rem),
        radial-gradient(circle at 85% 18%, rgba(96, 192, 255, 0.18), transparent 24rem),
        #101015;
    }

    main {
      width: min(94vw, 760px);
      padding: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.5rem);
      letter-spacing: 0;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      font-weight: 700;
    }

    .stats span {
      min-width: 84px;
      padding: 8px 10px;
      border: 1px solid rgba(246, 241, 232, 0.2);
      border-radius: 6px;
      background: rgba(16, 16, 21, 0.74);
      text-align: center;
    }

    canvas {
      width: 100%;
      aspect-ratio: 16 / 10;
      display: block;
      border: 2px solid rgba(246, 241, 232, 0.28);
      border-radius: 8px;
      background: #171822;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.35);
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      min-height: 42px;
      padding: 0 16px;
      border: 0;
      border-radius: 6px;
      background: #ffd166;
      color: #17120a;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: #ffe08f;
    }

    p {
      margin: 0;
      color: #d7d2c8;
      line-height: 1.4;
    }

    @media (max-width: 560px) {
      main {
        padding: 12px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .stats {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <h1>Star Catcher</h1>
      <div class="stats" aria-live="polite">
        <span id="score">Score 0</span>
        <span id="lives">Lives 3</span>
        <span id="time">Time 45</span>
      </div>
    </div>

    <canvas id="game" width="960" height="600" aria-label="Star Catcher game area"></canvas>

    <div class="controls">
      <p>Move with arrow keys or A/D. Catch stars. Dodge blocks.</p>
      <button id="restart" type="button">Restart</button>
    </div>
  </main>

  <script>
    const canvas = document.querySelector("#game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.querySelector("#score");
    const livesEl = document.querySelector("#lives");
    const timeEl = document.querySelector("#time");
    const restartBtn = document.querySelector("#restart");

    const keys = new Set();
    const player = { x: 450, y: 530, width: 70, height: 34, speed: 430 };
    let score;
    let lives;
    let timeLeft;
    let drops;
    let spawnTimer;
    let lastTime;
    let running;

    function resetGame() {
      score = 0;
      lives = 3;
      timeLeft = 45;
      drops = [];
      spawnTimer = 0;
      lastTime = performance.now();
      running = true;
      player.x = (canvas.width - player.width) / 2;
      updateHud();
      requestAnimationFrame(loop);
    }

    function updateHud() {
      scoreEl.textContent = `Score ${score}`;
      livesEl.textContent = `Lives ${lives}`;
      timeEl.textContent = `Time ${Math.ceil(Math.max(0, timeLeft))}`;
    }

    function spawnDrop() {
      const isStar = Math.random() > 0.32;
      drops.push({
        x: 28 + Math.random() * (canvas.width - 56),
        y: -36,
        radius: isStar ? 17 : 19,
        speed: isStar ? 135 + Math.random() * 130 : 160 + Math.random() * 150,
        type: isStar ? "star" : "block",
        spin: Math.random() * Math.PI
      });
    }

    function drawBackground() {
      ctx.fillStyle = "#171822";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(255,255,255,0.42)";
      for (let i = 0; i < 48; i += 1) {
        const x = (i * 139) % canvas.width;
        const y = (i * 83) % 430;
        ctx.fillRect(x, y, 2, 2);
      }

      ctx.fillStyle = "#242633";
      ctx.fillRect(0, 570, canvas.width, 30);
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
      ctx.fillStyle = "#5eead4";
      ctx.beginPath();
      ctx.moveTo(-36, 16);
      ctx.lineTo(0, -22);
      ctx.lineTo(36, 16);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#f6f1e8";
      ctx.fillRect(-12, 2, 24, 8);
      ctx.restore();
    }

    function drawStar(drop) {
      ctx.save();
      ctx.translate(drop.x, drop.y);
      ctx.rotate(drop.spin);
      ctx.fillStyle = "#ffd166";
      ctx.beginPath();
      for (let i = 0; i < 10; i += 1) {
        const angle = (Math.PI / 5) * i;
        const radius = i % 2 === 0 ? drop.radius : drop.radius * 0.46;
        ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawBlock(drop) {
      ctx.save();
      ctx.translate(drop.x, drop.y);
      ctx.rotate(drop.spin);
      ctx.fillStyle = "#ff6b6b";
      ctx.fillRect(-drop.radius, -drop.radius, drop.radius * 2, drop.radius * 2);
      ctx.restore();
    }

    function intersects(drop) {
      return drop.x > player.x - drop.radius &&
        drop.x < player.x + player.width + drop.radius &&
        drop.y > player.y - drop.radius &&
        drop.y < player.y + player.height + drop.radius;
    }

    function update(dt) {
      if (keys.has("ArrowLeft") || keys.has("a")) {
        player.x -= player.speed * dt;
      }
      if (keys.has("ArrowRight") || keys.has("d")) {
        player.x += player.speed * dt;
      }
      player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

      timeLeft -= dt;
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnDrop();
        spawnTimer = Math.max(0.32, 0.82 - score * 0.012);
      }

      for (const drop of drops) {
        drop.y += drop.speed * dt;
        drop.spin += dt * 2.2;
      }

      drops = drops.filter((drop) => {
        if (intersects(drop)) {
          if (drop.type === "star") {
            score += 1;
          } else {
            lives -= 1;
          }
          return false;
        }
        return drop.y < canvas.height + 50;
      });

      if (lives <= 0 || timeLeft <= 0) {
        running = false;
      }

      updateHud();
    }

    function drawEndMessage() {
      if (running) return;
      ctx.fillStyle = "rgba(16, 16, 21, 0.72)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#f6f1e8";
      ctx.textAlign = "center";
      ctx.font = "700 48px Arial";
      ctx.fillText(lives <= 0 ? "Game Over" : "Time!", canvas.width / 2, 270);
      ctx.font = "700 28px Arial";
      ctx.fillText(`Final score: ${score}`, canvas.width / 2, 318);
      ctx.font = "20px Arial";
      ctx.fillText("Press Restart to play again.", canvas.width / 2, 358);
    }

    function loop(now) {
      const dt = Math.min(0.035, (now - lastTime) / 1000);
      lastTime = now;
      if (running) update(dt);
      drawBackground();
      for (const drop of drops) {
        drop.type === "star" ? drawStar(drop) : drawBlock(drop);
      }
      drawPlayer();
      drawEndMessage();
      if (running) requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      keys.add(event.key);
      if (["ArrowLeft", "ArrowRight"].includes(event.key)) {
        event.preventDefault();
      }
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.key);
    });

    restartBtn.addEventListener("click", resetGame);
    resetGame();
  </script>
</body>
</html>
